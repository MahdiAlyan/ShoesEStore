services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: shoestore
      POSTGRES_USER: shoestore
      POSTGRES_PASSWORD: shoestore
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoestore"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://shoestore:shoestore@db:5432/shoestore
      DEBUG: "false"
      ALLOWED_HOSTS: localhost,127.0.0.1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media:/app/media

volumes:
  pgdata:
  media:
