{% load i18n static %}
{# Site-wide UI config bridge (i18n strings + flashed messages for api.js/ui.js/cart.js). Injected in both bases. #}
<script>
window.SS = {
    rtl: {% if LANGUAGE_BIDI %}true{% else %}false{% endif %},
    i18n: {
        success: "{% trans 'Success' %}",
        error: "{% trans 'Error' %}",
        confirm: "{% trans 'Are you sure?' %}",
        yes: "{% trans 'Yes' %}",
        cancel: "{% trans 'Cancel' %}",
        close: "{% trans 'Close' %}",
        removeTitle: "{% trans 'Remove this item?' %}",
        removeText: "{% trans 'This item will be removed from your cart.' %}",
        removeConfirm: "{% trans 'Yes, remove' %}",
        statusChangeTitle: "{% trans 'Change order status?' %}",
        statusChangeConfirm: "{% trans 'Yes, change it' %}"
    },
    messages: [
        {% for m in messages %}{ level: "{{ m.level_tag|escapejs }}", text: "{{ m|escapejs }}" }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ]
};
</script>
<script src="{% static 'js/api.js' %}"></script>
<script src="{% static 'js/ui.js' %}"></script>
