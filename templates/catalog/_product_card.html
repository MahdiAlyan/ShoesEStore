{% load i18n store_extras %}
<a href="{{ product.get_absolute_url }}" class="product-card">
    <div class="product-media">
        {% with img=product.main_image %}
            {% if img %}
                <img src="{{ img.image.url }}" class="product-img" alt="{{ product.name }}" loading="lazy" />
            {% else %}
                <div class="product-img product-img--empty" aria-hidden="true">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 16 5-5 4 4 3-3 6 6"/><circle cx="8.5" cy="9.5" r="1.5"/></svg>
            </div>
            {% endif %}
        {% endwith %}
        {% if not product.in_stock %}
            <span class="product-flag">{% trans "Out of stock" %}</span>
        {% endif %}
    </div>
    <div class="product-info">
        <span class="product-cat">{{ product.category.name }}</span>
        <h3 class="product-name">{{ product.name }}</h3>
        <span class="product-price tnum">{{ product.base_price|money }}</span>
    </div>
</a>
