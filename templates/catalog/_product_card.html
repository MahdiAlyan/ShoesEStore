{% load i18n %}
<div class="col-6 col-md-4 col-lg-3">
    <a href="{{ product.get_absolute_url }}" class="card h-100 border product-card text-decoration-none">
        {% with img=product.main_image %}
            {% if img %}
                <img src="{{ img.image.url }}" class="product-thumb card-img-top" alt="{{ product.name }}" loading="lazy" />
            {% else %}
                <div class="product-thumb card-img-top d-flex align-items-center justify-content-center text-muted">
                    <i class="ki-duotone ki-picture fs-3x"><span class="path1"></span><span class="path2"></span></i>
                </div>
            {% endif %}
        {% endwith %}
        <div class="card-body">
            <div class="text-muted fs-8 text-uppercase">{{ product.category.name }}</div>
            <div class="fw-semibold text-gray-900">{{ product.name }}</div>
            <div class="d-flex align-items-center justify-content-between mt-2">
                <span class="fw-bold fs-5 text-gray-900">${{ product.base_price }}</span>
                {% if product.in_stock %}
                    <span class="badge badge-light-success">{% trans "In stock" %}</span>
                {% else %}
                    <span class="badge badge-light-danger">{% trans "Out of stock" %}</span>
                {% endif %}
            </div>
        </div>
    </a>
</div>
